name: Build and Deploy on Tag

on:
  push:
#    branches:
#      - main
    tags:
      - 'v*.*.*'
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js (with npm cache)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        # Prefer npm ci for reproducible installs; change back to `npm install` if needed.
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: itch-deploy
          path: ./dist


  PublishToItch:
    needs: Build
    runs-on: ubuntu-latest
    # Only run publish when workflow was triggered by a tag
    # if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Download packaged build
        uses: actions/download-artifact@v8
        with:
          name: itch-deploy
          path: ./dist/

      - name: Setup butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload to itch.io
        # Push the downloaded ./dist directory
        run: butler push ./dist sorskoot/skyroller:html
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}